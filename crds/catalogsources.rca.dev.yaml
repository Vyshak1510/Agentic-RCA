apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: catalogsources.rca.dev
spec:
  group: rca.dev
  scope: Namespaced
  names:
    plural: catalogsources
    singular: catalogsource
    kind: CatalogSource
    shortNames:
      - csrc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [resolverChain]
              properties:
                resolverChain:
                  type: array
                  items:
                    type: string
                cmdb:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    endpoint:
                      type: string
                rag:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    sourceRef:
                      type: string
