services:
  postgres:
    image: postgres:15
    container_name: temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
      - "8233:8233"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_UI_CORS_ORIGINS:-http://localhost:8088}
    ports:
      - "${TEMPORAL_UI_PORT:-8088}:8080"

  ingest-api:
    image: python:3.11-slim
    container_name: rca-ingest-api
    init: true
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "python -m pip install -e . &&
      PYTHONPATH=/workspace uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir services/ingest-api/app"
    environment:
      PYTHONUNBUFFERED: "1"
      API_KEY: ${API_KEY:-}
      TEMPORAL_AUTOSTART_ENABLED: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: rca-investigations
      ORCHESTRATOR_EVENT_BASE_URL: http://ingest-api:8000
      CORS_ALLOW_ORIGINS: http://localhost:3001,http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      RCA_MODEL_ALIAS_CODEX: ${RCA_MODEL_ALIAS_CODEX:-}
      RCA_MODEL_ALIAS_CLAUDE: ${RCA_MODEL_ALIAS_CLAUDE:-}
      NEW_RELIC_API_KEY: ${NEW_RELIC_API_KEY:-}
      MCP_NEWRELIC_INCLUDE_TAGS: ${MCP_NEWRELIC_INCLUDE_TAGS:-}
      GRAFANA_MCP_API_KEY: ${GRAFANA_MCP_API_KEY:-}
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      GRAFANA_ORG_ID: ${GRAFANA_ORG_ID:-}
      RCA_LLM_STRICT: ${RCA_LLM_STRICT:-0}
    depends_on:
      - temporal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
      - pip-cache:/root/.cache/pip

  orchestrator-worker:
    image: python:3.11-slim
    container_name: rca-orchestrator-worker
    init: true
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh -lc "python -m pip install -e . &&
      PYTHONPATH=/workspace python -m services.orchestrator.app.worker"
    environment:
      PYTHONUNBUFFERED: "1"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: rca-investigations
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LLM_API_BASE: ${LLM_API_BASE:-}
      RCA_MODEL_ALIAS_CODEX: ${RCA_MODEL_ALIAS_CODEX:-}
      RCA_MODEL_ALIAS_CLAUDE: ${RCA_MODEL_ALIAS_CLAUDE:-}
      NEW_RELIC_API_KEY: ${NEW_RELIC_API_KEY:-}
      MCP_NEWRELIC_INCLUDE_TAGS: ${MCP_NEWRELIC_INCLUDE_TAGS:-}
      GRAFANA_MCP_API_KEY: ${GRAFANA_MCP_API_KEY:-}
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN:-}
      GRAFANA_ORG_ID: ${GRAFANA_ORG_ID:-}
      RCA_LLM_STRICT: ${RCA_LLM_STRICT:-0}
    depends_on:
      temporal:
        condition: service_started
      ingest-api:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - pip-cache:/root/.cache/pip

  web-ui:
    image: node:20-alpine
    container_name: rca-web-ui
    init: true
    restart: unless-stopped
    working_dir: /workspace
    command: >-
      sh /workspace/scripts/docker_web_ui_dev.sh
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://ingest-api:8000
      NEXT_PUBLIC_API_KEY: ${API_KEY:-}
      NEXT_PUBLIC_DEFAULT_TENANT: default
      NEXT_PUBLIC_DEFAULT_ROLE: admin
      NEXT_PUBLIC_DEFAULT_USER: web-ui
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      ingest-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    ports:
      - "3001:3001"
    volumes:
      - ./:/workspace
      - web-node-modules:/workspace/services/web-ui/node_modules
      - web-next-cache:/workspace/services/web-ui/.next

volumes:
  temporal-postgres-data:
  pip-cache:
  web-node-modules:
  web-next-cache:
